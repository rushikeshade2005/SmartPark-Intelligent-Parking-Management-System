version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smartpark-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartpark-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpark-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/smartparking
      - JWT_SECRET=${JWT_SECRET:-change_me_before_production}
      - JWT_EXPIRE=7d
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    depends_on:
      - mongodb
    networks:
      - smartpark-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartpark-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartpark-network

volumes:
  mongodb_data:

networks:
  smartpark-network:
    driver: bridge
